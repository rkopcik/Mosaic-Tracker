<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Mosaic Crochet Tracker</title>

<style>

body{
font-family:Arial, sans-serif;
margin:20px;
max-width:100%;
overflow-x:hidden;
zoom:2;
}

textarea{
width:100%;
height:120px;
font-size:16px;
}

.steps{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.step{
border:1px solid black;
padding:12px 16px;
cursor:pointer;
font-weight:bold;
font-size:18px;
background:white;
}

.done{
opacity:.35;
}

.current{
background:#fff3a0;
}

.row-small{
opacity:.4;
font-size:14px;
margin-top:10px;
}

.row{
margin-top:20px;
}

button{
padding:10px 14px;
font-size:16px;
margin-top:10px;
margin-right:10px;
}

#dashProject{
font-size:22px;
font-weight:bold;
margin-bottom:6px;
}  
#patternInput,
#loadButton,
#color1,
#color2,
#rowStart,
#startColor {
display:none;
}
#controls{display:none;
         }

/* DASHBOARD */

#dashboard{
position:sticky;
top:0;
z-index:1000;

display:grid;
grid-template-columns: 1fr 1fr;
grid-template-rows:auto auto auto auto;

column-gap:40px;
row-gap:6px;

align-items:center;
font-size:18px;

padding:10px 0;
background:white;
border-bottom:1px solid #ccc;
}
#dashProject { grid-column:1; grid-row:1; font-size:26px; font-weight:bold; }

#dashColor { grid-column:2; grid-row:1; }

#dashGoal { grid-column:1; grid-row:2; }

#dashToday { grid-column:2; grid-row:2; }

#dashRow { grid-column:1; grid-row:3; }

#dashProgress { grid-column:2; grid-row:3; }

#dashControls { grid-column:1 / span 2; grid-row:4; display:flex; gap:10px; align-items:center; }
         
/* header */

#dashHeader{
display:flex;
justify-content:space-between;
align-items:center;
font-size:28px;
font-weight:bold;
margin-bottom:6px;
}

#menuButton{
cursor:pointer;
font-size:26px;
}

/* stat rows */

#dashLine1,
#dashLine2,
#dashLine3{
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
margin-top:4px;
}

/* controls */

#dashControls{
display:flex;
align-items:center;
gap:10px;
margin-top:6px;
}

#dashControls button{
padding:6px 12px;
font-size:16px;
}

/* zoom */

#dashZoom{
display:flex;
align-items:center;
gap:10px;
margin-top:8px;
font-size:16px;
line-height:1;
}

#dashZoom button{
display:flex;
align-items:center;
justify-content:center;
height:26px;
}

</style>

</style>

</head>

<body>

<div id="dashboard">

  <div id="dashLeft">

    <div id="dashProject"></div>

    <div id="dashColor"></div>

    <div id="dashGoal"></div>

    <div id="dashRow"></div>

    <div id="dashResetButtons">
      <button onclick="resetRow(currentRow)">Reset Current Row</button>
      <button onclick="resetPreviousRow()">Reset Previous Row</button>
    </div>

  </div>


  <div id="dashRight">

    <div id="dashMenu">☰</div>

    <div id="dashStitches"></div>

    <div id="dashGoalTime"></div>

    <div id="dashProjectTime"></div>

    <div id="dashZoomButtons">
      <button onclick="setZoom(1)">1x</button>
      <button onclick="setZoom(1.5)">1.5x</button>
      <button onclick="setZoom(2)">2x</button>
    </div>

  </div>

</div>

  
  
<script>

let rows = []
let currentRow = 0

function saveProgress(){

localStorage.setItem("mosaic_rows", JSON.stringify(rows))
localStorage.setItem("mosaic_currentRow", currentRow)
localStorage.setItem("mosaic_projectName", document.getElementById("dashProject").value)
localStorage.setItem("mosaic_rowStart", document.getElementById("rowStart").value)
localStorage.setItem("mosaic_color1", document.getElementById("color1").value)
localStorage.setItem("mosaic_color2", document.getElementById("color2").value)
localStorage.setItem("mosaic_startColor", document.getElementById("startColor").value)

}

function loadProgress(){

const savedRows = localStorage.getItem("mosaic_rows")
const savedRow = localStorage.getItem("mosaic_currentRow")

if(savedRows){
rows = JSON.parse(savedRows)
currentRow = parseInt(savedRow) || 0
const loadBtn = document.getElementById("loadButton")
if(loadBtn) loadBtn.disabled = true
document.getElementById("dashProject").innerText =
"Project: " + (localStorage.getItem("mosaic_projectName") || "")
document.getElementById("color1").value = localStorage.getItem("mosaic_color1") || ""
document.getElementById("color2").value = localStorage.getItem("mosaic_color2") || ""
document.getElementById("startColor").value =
localStorage.getItem("mosaic_startColor") || " light"
document.getElementById("rowStart").value =
localStorage.getItem("mosaic_rowStart") || 1 

render()


}
}
function parsePattern(){

const text = document.getElementById("patternInput").value

rows = []
let current = []

const lines = text.split("\n")

lines.forEach(line => {

line = line.trim()

if(line === "") return

// detect new row label
if(/^row\s*\d+/i.test(line) || /^\d+\s/.test(line)){

if(current.length > 0){
rows.push(current)
current = []
}

// remove row label
line = line.replace(/^row\s*\d+[:.]?\s*/i,"")
line = line.replace(/^\d+[:.]?\s*/,"")

}

// split stitches
line.split(",").forEach(part => {

const stitch = part.trim()

if(stitch !== ""){
current.push({
text: stitch,
done: false
})
}

})

})

if(current.length > 0){
rows.push(current)
}

currentRow = 0
saveProgress()
render()

document.getElementById("loadButton").disabled = true

}

function toggle(rowIndex, stepIndex){

// block future rows
if(rowIndex > currentRow) return

// enforce order only for current row
if(rowIndex === currentRow){

const next = rows[rowIndex].findIndex(s => !s.done)

if(stepIndex > next) return

}

// toggle stitch
rows[rowIndex][stepIndex].done = !rows[rowIndex][stepIndex].done

// auto advance row
if(rowIndex === currentRow){

const finished = rows[rowIndex].every(s => s.done)

if(finished && currentRow < rows.length - 1){
currentRow++
}

}

saveProgress()

render()

}

function resetRow(rowIndex){

rows[rowIndex].forEach(s => s.done = false)

currentRow = rowIndex

saveProgress()

render()

}

function clearProject(){

localStorage.removeItem("mosaic_rows")
localStorage.removeItem("mosaic_currentRow")
localStorage.removeItem("mosaic_projectName")
localStorage.removeItem("mosaic_rowStart")

rows = []
currentRow = 0

document.getElementById("patternInput").value = ""
document.getElementById("projectName").value = ""

document.getElementById("loadButton").disabled = false

render()

}

function buildRow(rowIndex, small=false){

if(rowIndex < 0 || rowIndex >= rows.length) return null

const container = document.createElement("div")
container.className = small ? "row-small" : "row"

const steps = document.createElement("div")
steps.className = "steps"

rows[rowIndex].forEach((seg,i)=>{

const step = document.createElement("div")

step.className = "step"

if(seg.done) step.classList.add("done")

if(!small && !seg.done &&
i === rows[rowIndex].findIndex(s=>!s.done)){
step.classList.add("current")
}

step.innerText = seg.text

step.onclick = () => toggle(rowIndex,i)

steps.appendChild(step)

})

container.appendChild(steps)

return container

}

function countStitches(row){

let total = 0
let groupTotal = 0
let inGroup = false
let groupMultiplier = 1

row.forEach(step => {

let raw = step.text.toLowerCase()

let numMatch = raw.match(/\d+/)
let stitches = numMatch ? parseInt(numMatch[0]) : 1

if(raw.includes("(")){
inGroup = true
groupTotal = 0
}

if(inGroup){
groupTotal += stitches
}else{
total += stitches
}

if(raw.includes(")")){
let multMatch = raw.match(/x(\d+)/)
groupMultiplier = multMatch ? parseInt(multMatch[1]) : 1

total += groupTotal * groupMultiplier

groupTotal = 0
groupMultiplier = 1
inGroup = false
}

})

return total
}
  
function render(){

const tracker = document.getElementById("tracker")

tracker.innerHTML = ""

if(rows.length === 0) return
document.getElementById("dashProject").innerText =
document.getElementById("mosaic-projectName").value || "Crochet Project"
const prev = buildRow(currentRow-1,true)
if(prev) tracker.appendChild(prev)


const color1 = document.getElementById("color1").value || "Color 1"
const color2 = document.getElementById("color2").value || "Color 2"

const workingColor = (currentRow % 2 === 0) ? color1 : color2

document.getElementById("dashColor").innerText =
"Working Color: " + workingColor

const title = document.createElement("h3")
const rowStart = parseInt(document.getElementById("rowStart").value) || 1
const actualRow = rowStart + currentRow

const totalRows = rows.length + rowStart - 1

const rowPercent = Math.round((currentRow / rows.length) * 100)

document.getElementById("dashRow").innerText =
"Row: " + actualRow + " of " + totalRows + " (" + rowPercent + "%)"
  
title.innerText = `Row ${actualRow}`
title.style.fontSize = "28px"
title.style.fontWeight = "bold" 
title.id = "currentRowTitle"
tracker.appendChild(title)

const current = buildRow(currentRow,false)

const totalStitches = countStitches(rows[currentRow])
let completedStitches = 0

rows[currentRow].forEach(step => {

if(step.done){

completedStitches += countStitches([step])

}

})

const progress = Math.round((completedStitches / totalStitches) * 100)

document.getElementById("dashStitches").innerText =
"Stitches: " + completedStitches + " / " + totalStitches + " (" + progress + "%)"  

const start = document.getElementById("startColor").value
const isLightRow = (currentRow % 2 === 0)

const tint =
(start === "light")
  ? (isLightRow ? "#ffffff" : "#dcecff")
  : (isLightRow ? "#dcecff" : "#ffffff")

current.style.backgroundColor = tint
current.style.padding = "10px"
current.style.borderRadius = "6px"

tracker.appendChild(current)

const next = buildRow(currentRow+1,true)
if(next) tracker.appendChild(next)

setTimeout(() => {

  const activeStitch = document.querySelector(".step.current")

  if(activeStitch){
    activeStitch.scrollIntoView({
      behavior: "smooth",
      block: "center"
    })
  }

}, 50)
}
document.addEventListener("DOMContentLoaded", () => {

loadProgress()

const savedPattern = localStorage.getItem("mosaic_patternText")

if(savedPattern && savedPattern.trim() !== ""){
document.getElementById("patternInput").value = savedPattern
parsePattern()
}

})

</script>

</body>

</html>
