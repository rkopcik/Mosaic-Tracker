name: Dev Preview

on:
  push:
    branches:
      - dev

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy dev preview
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_branch: gh-pages-dev
          publish_dir: .
          github_token: ${{ secrets.GITHUB_TOKEN }}
